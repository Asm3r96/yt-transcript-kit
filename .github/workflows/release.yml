name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version without a v prefix, for example 0.2.0'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate version input
        run: node -e "const v = process.argv[1]; if (!/^\\d+\\.\\d+\\.\\d+(?:-[0-9A-Za-z.-]+)?$/.test(v)) { console.error('Version must look like 0.2.0 or 0.2.0-beta.1'); process.exit(1); }" "${{ inputs.version }}"

      - name: Run release checks
        run: npm run release:check

      - name: Detect current package version
        id: package_version
        run: echo "current=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        if: ${{ steps.package_version.outputs.current != inputs.version }}
        run: npm version "${{ inputs.version }}" -m "release: %s"

      - name: Create release tag for current version
        if: ${{ steps.package_version.outputs.current == inputs.version }}
        run: git tag "v${{ inputs.version }}"

      - name: Push release commit and tag
        run: git push origin HEAD --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" --generate-notes --title "v${{ inputs.version }}"

      - name: Publish to npm with token
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish to npm with trusted publishing
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: npm publish --access public --provenance
